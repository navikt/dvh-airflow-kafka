# github actions
name: Build and deploy

on:
  push:
    branches:
      - main
      - feat**
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

env:
  IMAGE_NAME: "ghcr.io/${{ github.repository }}"
  TEAM: dvh-etl-tools

jobs:
  build_and_deploy:
    name: Build and deploy the image
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Add sha to environment variable"
        env:
          FULL_SHA: "${{github.sha}}"
          REF: "${{github.ref}}"
        run: |
          TAG=$(git log -1 --pretty=%ad --date=format:%Y%m%d-%H%M%S)
          branch="$(echo "$REF" | cut -c12-)"
          if [ "$branch" = "main" ]
          then
              echo "IMAGE=$IMAGE_NAME:$TAG" >> $GITHUB_ENV
          else
              safe_branch=$(echo "$branch" | sed 's/[^a-zA-Z0-9._-]/-/g')
              echo "IMAGE=$IMAGE_NAME-$safe_branch:$TAG" >> $GITHUB_ENV
          fi

      - name: Build and push to Google Artifact Registry
        uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # v0
        id: docker-build-push
        with:
          team: ${{ env.TEAM }}
          dockerfile: Dockerfile

      - name: Push image to Github Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker buildx imagetools create -t "${{ env.IMAGE }}" "${{ steps.docker-build-push.outputs.image }}"

      - name: Deploy job to nais
        uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/image-job-template.yml
          VAR: image=${{ steps.docker-build-push.outputs.image }}
          WORKLOAD_IMAGE: ${{ steps.docker-build-push.outputs.image }}


